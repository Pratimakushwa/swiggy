{% extends 'main/base.html' %}
{% block title %}Delete {{ type|title }}{% endblock %}
{% block content %}
<style>
    .delete-container {
        max-width: 500px;
        margin: 50px auto;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        text-align: center;
    }
    .delete-icon {
        font-size: 60px;
        margin-bottom: 20px;
    }
    .delete-title {
        font-size: 24px;
        font-weight: bold;
        color: #1f2937;
        margin-bottom: 15px;
    }
    .delete-message {
        color: #6b7280;
        margin-bottom: 30px;
        font-size: 16px;
    }
    .delete-item {
        background: #fef3c7;
        color: #92400e;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 30px;
        border-left: 4px solid #f59e0b;
    }
    .delete-buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
    }
    .btn-delete {
        background: #ef4444;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.3s;
    }
    .btn-delete:hover {
        background: #dc2626;
    }
    .btn-cancel {
        background: #f3f4f6;
        color: #1f2937;
        border: none;
        padding: 12px 30px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.3s;
    }
    .btn-cancel:hover {
        background: #e5e7eb;
    }
</style>

<div class="delete-container">
    <div class="delete-icon">⚠️</div>
    <div class="delete-title">Delete {{ type|title }}</div>
    <div class="delete-message">Are you sure you want to delete this {{ type }}?</div>
    
    <div class="delete-item">
        <strong>{{ object }}</strong>
    </div>
    
    <div class="delete-message" style="color: #ef4444; font-size: 14px;">
        ⚠️ This action cannot be undone.
    </div>
    
    <div class="delete-buttons">
        <form method="post" style="margin: 0;">
            {% csrf_token %}
            <button class="btn-delete" type="submit">🗑️ Yes, Delete</button>
        </form>
        <button class="btn-cancel" onclick="history.back()">← No, Cancel</button>
    </div>
</div>
{% endblock %}
